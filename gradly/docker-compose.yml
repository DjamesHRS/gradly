version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gradly_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: gradly_user
      MYSQL_PASSWORD: gradly_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./public/database/script.sql:/docker-entrypoint-initdb.d/script.sql
    networks:
      - gradly_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    image: php:8.1-apache
    container_name: gradly_web
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_USER=gradly_user
      - DB_PASSWORD=gradly_pass
      - DB_NAME=gradly
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gradly_network
    command: >
      bash -c "
      a2enmod rewrite &&
      apache2-foreground
      "

volumes:
  mysql_data:

networks:
  gradly_network:
    driver: bridge
